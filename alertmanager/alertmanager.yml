route:
  group_by: ['alertname', 'severity', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'telegram-critical'
  routes:
    - matchers:
        - severity = critical
      receiver: telegram-critical
      repeat_interval: 1h
    - matchers:
        - severity = warning
      receiver: telegram-warning
      repeat_interval: 4h

receivers:
  - name: telegram-critical
    telegram_configs:
      - bot_token: __TELEGRAM_BOT_TOKEN__
        chat_id: __TELEGRAM_CHAT_ID__
        parse_mode: HTML
        message: '{{ template "telegram.alert" . }}'
        disable_notifications: false

  - name: telegram-warning
    telegram_configs:
      - bot_token: __TELEGRAM_BOT_TOKEN__
        chat_id: __TELEGRAM_CHAT_ID__
        parse_mode: HTML
        message: '{{ template "telegram.alert" . }}'
        disable_notifications: false

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: ['alertname', 'service']

  - source_matchers:
      - alertname = PrometheusDown
    target_matchers:
      - severity = critical
