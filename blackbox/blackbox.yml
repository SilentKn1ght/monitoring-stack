modules:
  http_2xx:
    prober: http
    http:
      preferred_ip_protocol: ip4
      valid_status_codes:
        - 200
        - 201
        - 202
        - 301
        - 302
        - 401
      no_follow_redirects: false
      fail_if_ssl: false
      fail_if_not_ssl: false
      tls_config:
        insecure_skip_verify: true

  icmp:
    prober: icmp
    icmp:
      preferred_ip_protocol: ip4
